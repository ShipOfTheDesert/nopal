name: main

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: extractions/setup-just@v3
        with:
          just-version: '1.46.0'
      - uses: ./.github/actions/ocaml-deps

      - name: Build
        run: just build

      - name: Test
        run: just test

  tauri-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: extractions/setup-just@v3
        with:
          just-version: '1.46.0'
      - uses: ./.github/actions/ocaml-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cd tauri && npm ci

      - name: Build Tauri
        run: just build-tauri

  # REQ-F5 Tauri E2E (RFC 0112 Step 7/8). Main-only and NOT a required check —
  # the WebKitWebDriver + xvfb + tauri-driver toolchain is heavy and tauri-driver
  # flakes are kept off the per-PR critical path (RFC Risk list). Breakage here is
  # caught post-merge by design.
  e2e-tauri:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: extractions/setup-just@v3
        with:
          just-version: '1.46.0'
      - uses: ./.github/actions/ocaml-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install Tauri + WebDriver system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Install Tauri CLI
        run: cd tauri && npm ci

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install WebdriverIO harness dependencies
        run: cd test/e2e/tauri && npm ci

      - name: Run Tauri E2E suite
        run: just e2e-tauri

